name: cd

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"
          
      - name: Build custom gcloud
        run: |
          go install github.com/vikfreeze/gcloud@latest
          # Verify the binary is in PATH
          echo "gcloud version:"
          gcloud --version

      - name: Build app
        run: ./scripts/buildprod.sh

      # Run the command using the newly built binary
      - name: Submit build to Cloud Build
        run: gcloud builds submit .